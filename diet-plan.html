<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriCopilot — Clinical Diet Plan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="diet-plan.css">
</head>
<body class="plan-page-body">
    <main class="plan-page-shell">
        <header class="plan-topbar">
            <a class="plan-back-link" href="workspace.html">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Workspace
            </a>
            <div class="plan-brand-mark">NutriCopilot</div>
            <div class="plan-status-pill">Doctor Review</div>
        </header>

        <section class="plan-hero">
            <div class="plan-hero-copy">
                <h1>Weekly Clinical Diet Plan</h1>
                <div class="plan-hero-actions">
                    <button class="plan-primary-btn" id="approvePlanBtn">Approve Plan</button>
                    <button class="plan-secondary-btn" id="exportPlanBtn">Export PDF</button>
                </div>
            </div>
            <div class="plan-patient-card">
                <div class="plan-patient-main">
                    <div class="plan-avatar" id="planAvatar">RS</div>
                    <div>
                        <h2 id="planPatientName">Rajesh Sharma</h2>
                        <p id="planPatientMeta">Male · 52 yrs · BMI 28.4</p>
                    </div>
                </div>
                <div class="plan-risk-chip">High Risk</div>
                <div class="plan-patient-tags">
                    <span>Vegetarian</span>
                    <span>Diabetic Friendly</span>
                    <span>Low Sodium</span>
                </div>
            </div>
        </section>

        <section class="plan-summary-grid">
            <article class="nutrition-card"><i>kcal</i><strong>1,815</strong><span>Calories</span></article>
            <article class="nutrition-card"><i>Pr</i><strong>95g</strong><span>Protein</span></article>
            <article class="nutrition-card"><i>Cb</i><strong>200g</strong><span>Carbs</span></article>
            <article class="nutrition-card"><i>Ft</i><strong>55g</strong><span>Fat</span></article>
            <article class="nutrition-card"><i>Fi</i><strong>39g</strong><span>Fiber</span></article>
        </section>

        <nav class="plan-day-tabs" id="planDayTabs" aria-label="Weekly plan days"></nav>

        <section class="meal-plan-section">
            <div class="meal-plan-heading">
                <div>
                    <span class="plan-eyebrow">Meal schedule</span>
                    <h2><span id="activeDayName">Monday</span> recommendations</h2>
                </div>
                <div class="meal-plan-controls">
                    <label class="meal-count-control" for="hydrationSelect">
                        <span>Water intake</span>
                        <select id="hydrationSelect" aria-label="Water intake">
                            <option value="1.5">1.5 L water</option>
                            <option value="2">2 L water</option>
                            <option value="2.5" selected>2.5 L water</option>
                            <option value="3">3 L water</option>
                            <option value="custom">Custom</option>
                        </select>
                    </label>
                    <label class="meal-count-control" for="mealCountSelect">
                        <span>Meals per day</span>
                        <select id="mealCountSelect" aria-label="Meals per day">
                            <option value="3">3 meals</option>
                            <option value="4">4 meals</option>
                            <option value="5">5 meals</option>
                            <option value="6">6 meals</option>
                            <option value="7" selected>7 meals</option>
                        </select>
                    </label>
                </div>
            </div>
            <div class="meal-carousel-shell">
                <button class="meal-carousel-btn meal-carousel-btn-left" id="mealCarouselPrev" type="button" aria-label="Previous meals">‹</button>
                <div class="meal-card-grid" id="mealCardGrid"></div>
                <button class="meal-carousel-btn meal-carousel-btn-right" id="mealCarouselNext" type="button" aria-label="Next meals">›</button>
            </div>
        </section>
    </main>

    <div class="meal-edit-modal" id="mealEditModal" hidden>
        <div class="meal-edit-dialog" role="dialog" aria-modal="true" aria-labelledby="mealEditTitle">
            <div class="meal-edit-dialog-header">
                <div>
                    <span class="plan-eyebrow">Doctor edit</span>
                    <h2 id="mealEditTitle">Edit meal</h2>
                </div>
                <button class="meal-edit-close" id="mealEditClose" type="button" aria-label="Close edit dialog">×</button>
            </div>
            <form class="meal-edit-form" id="mealEditForm">
                <label class="meal-edit-field" for="mealRecommendationInput">
                    <span>Primary Recommendation</span>
                    <textarea id="mealRecommendationInput" rows="8" placeholder="Add one recommendation per line"></textarea>
                </label>
                <label class="meal-edit-field" for="mealPortionInput">
                    <span>Portion Size</span>
                    <textarea id="mealPortionInput" rows="3" placeholder="Add portion guidance"></textarea>
                </label>
                <div class="meal-edit-actions">
                    <button class="plan-secondary-btn" id="mealEditCancel" type="button">Cancel</button>
                    <button class="plan-primary-btn" type="submit">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
    <script src="diet-plan.js"></script>
</body>
</html>
